# PROTOCOLOS MULTI-ESPECIALISTAS

protocolos:

  campanha_completa:
    trigger: ["campanha completa", "campanha integrada", "lançamento de produto"]
    descricao: "Campanha completa com estratégia, copy, visual e mídia paga"
    especialistas:
      - gerente-marketing
      - redator
      - designer
      - gestor-trafego

  lancamento_produto:
    trigger: ["lançar produto", "lançamento", "novo produto", "nova feature"]
    descricao: "Planejamento completo de lançamento"
    especialistas:
      - estrategista-marca
      - especialista-storytelling
      - redator
      - gestor-trafego

  identidade_marca:
    trigger: ["identidade de marca", "criar marca", "brand book", "manual de marca"]
    descricao: "Construção completa de identidade de marca"
    especialistas:
      - estrategista-marca
      - gerente-marketing
      - designer

  funil_conteudo:
    trigger: ["funil de conteúdo", "estratégia de conteúdo", "calendário editorial"]
    descricao: "Funil completo de conteúdo topo/meio/fundo"
    especialistas:
      - gerente-marketing
      - redator
      - especialista-storytelling

  diagnostico_marketing:
    trigger: ["diagnóstico de marketing", "auditoria de marketing", "análise completa marketing"]
    descricao: "Diagnóstico completo da estratégia de marketing atual"
    especialistas:
      - gerente-marketing
      - estrategista-marca
      - gestor-trafego
      - redator
      - designer
      - especialista-storytelling
