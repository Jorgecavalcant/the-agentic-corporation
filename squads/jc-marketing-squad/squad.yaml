name: jc-marketing-squad
version: "1.0.0"
short-title: "Marketing JC"
description: >
  Agência de marketing virtual da JC TECNOLOGIA LTDA.
  7 super-profissionais cobrindo estratégia, branding, copy, design,
  tráfego pago, storytelling e operações de conteúdo.
  Absorve os melhores frameworks de Copy Squad, Brand Squad,
  Traffic Masters e Storytelling Squad do xQuads + OpenSquad.
author: "Jorge Cavalcante — JC TECNOLOGIA LTDA"
license: MIT
slashPrefix: "jc-marketing"
idioma: "pt-BR"

aios:
  minVersion: "4.0.0"
  type: squad

tags:
  - marketing
  - branding
  - copywriting
  - design
  - trafego
  - storytelling
  - conteudo
  - redes-sociais
  - lancamento
  - funil

components:
  agents:
    - orchestrator.md              # jc-cmo — Diretor de Marketing (Tier-0)
    - gerente-marketing.md         # Gerente de Marketing + Brand Squad (Aaker, Neumeier, Miller)
    - redator.md                   # Redator + Copy Squad (Ogilvy, Kennedy, Bencivenga, Brunson...)
    - designer.md                  # Designer + Design Squad (Brad Frost, UX, Visual Generator)
    - gestor-trafego.md            # Gestor de Tráfego Pago + Traffic Masters
    - estrategista-marca.md        # Estrategista de Marca + Brand Squad (Arquétipos, Naming)
    - especialista-storytelling.md # Especialista em Storytelling + Storytelling Squad

  tasks:
    - criar-campanha.md
    - escrever-copy.md
    - criar-identidade-marca.md
    - planejar-lancamento.md
    - criar-funil-conteudo.md
    - configurar-anuncio.md
    - criar-roteiro-narrativo.md
    - diagnostico-marketing.md

  workflows:
    - wf-lancamento-produto.yaml
    - wf-campanha-conteudo.yaml
    - wf-criacao-marca.yaml

  checklists:
    - checklist-qualidade-marketing.md

hierarchy:
  superior: jc-agent-manager
  reporta_para: jc-cmo
  pares: [jc-vendas-squad, jc-produto-squad]
  nota: >
    Subordinado ao jc-agent-manager.
    O jc-cmo é o Diretor de Marketing e orquestrador do squad.
    Alinha com jc-vendas-squad para funis de aquisição.

config:
  extends: jc-agents-kit
  modelo_padrao: sonnet
  idioma: pt-BR
