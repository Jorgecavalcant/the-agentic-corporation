squad: jc-estrategia-squad
description: Roteamento de demandas estratégicas e de compliance

domains:
  orchestrator:
    agent: orchestrator
    keywords:
      - orquestrar
      - distribuir
      - qual agente
      - coordenar
      - multi-squad
      - demanda do ceo
    examples:
      - "Quero um diagnóstico completo da empresa"
      - "Qual o status de todos os produtos?"

  cco:
    agent: cco
    keywords:
      - cvm
      - lgpd
      - compliance
      - legal
      - contrato
      - termos de uso
      - política de privacidade
      - regulação
      - bcb
      - consultoria financeira
    examples:
      - "Essa feature viola a CVM 175?"
      - "Revisar os Termos de Uso do Método Planejar"

  compliance-officer:
    agent: compliance-officer
    keywords:
      - checklist lgpd
      - auditoria de código
      - dados pessoais no código
      - conformidade técnica
      - log com cpf
    examples:
      - "Auditar o módulo de Open Banking para LGPD"
      - "Verificar se o endpoint de login está compliant"
