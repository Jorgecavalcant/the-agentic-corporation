# Catálogo de Roteamento — Departamento de Vendas JC
# O Diretor de Vendas (jc-dir-vendas) usa este catálogo para rotear demandas

especialistas:

  especialista-ofertas:
    agente: especialista-ofertas
    keywords:
      - oferta
      - pacote
      - pricing
      - preço
      - desconto
      - promoção
      - plano
      - assinatura
      - value stack
      - garantia
      - bônus
      - valor percebido
      - upsell
      - cross-sell
      - trial
      - freemium
      - plano anual
      - plano mensal
      - bundling
    exemplos:
      - "Criar uma oferta de lançamento para o Método Planejar"
      - "Como melhorar o value stack do plano Pro do Fiado Pro?"
      - "Revisar o pricing atual do AgroCredit"

  especialista-leads:
    agente: especialista-leads
    keywords:
      - lead
      - prospecto
      - icp
      - perfil de cliente ideal
      - qualificação
      - bant
      - meddic
      - pipeline
      - funil de vendas
      - geração de leads
      - prospecção
      - inbound
      - outbound
      - sdr
      - lead scoring
      - cadência
      - lista de prospecção
      - captação
    exemplos:
      - "Definir o ICP do Método Planejar B2B"
      - "Criar cadência de prospecção para cooperativas agro"
      - "Como qualificar leads do Fiado Pro vindos do tráfego pago?"

  especialista-conversao:
    agente: especialista-conversao
    keywords:
      - conversão
      - fechamento
      - taxa de conversão
      - objeção
      - script de vendas
      - demo
      - apresentação de vendas
      - proposta comercial
      - negociação
      - fechamento
      - spin selling
      - challenger
      - reunião de vendas
      - follow-up
      - ciclo de vendas
    exemplos:
      - "Criar script para tratar objeção 'já tentei planilha e não funcionou'"
      - "Como melhorar a taxa de conversão do trial para pago?"
      - "Estruturar processo de vendas B2B para white-label"

  especialista-retencao:
    agente: especialista-retencao
    keywords:
      - retenção
      - churn
      - cancelamento
      - customer success
      - onboarding
      - aha moment
      - ativação
      - nps
      - satisfação do cliente
      - lifetime value
      - ltv
      - engajamento
      - recuperar cliente
      - win-back
      - programa de indicação
      - referral
      - inadimplência de assinatura
      - renovação
    exemplos:
      - "Como reduzir o churn do Método Planejar?"
      - "Criar playbook de onboarding para white-label"
      - "Estratégia de win-back para clientes que cancelaram nos últimos 90 dias"

  analista-receita:
    agente: analista-receita
    keywords:
      - mrr
      - arr
      - receita recorrente
      - métricas saas
      - cac
      - ltv
      - cac ltv
      - payback
      - nrr
      - cohort
      - análise de cohort
      - projeção de receita
      - crescimento
      - benchmark
      - análise financeira vendas
      - unidade econômica
      - arpu
    exemplos:
      - "Calcular LTV/CAC atual do Método Planejar"
      - "Projeção de MRR para os próximos 12 meses com 3 cenários"
      - "Análise de cohort da base B2C dos últimos 6 meses"

# PROTOCOLOS MULTI-ESPECIALISTAS

protocolos:

  diagnostico_vendas:
    trigger: ["diagnóstico de vendas", "auditoria de receita", "análise completa de vendas"]
    descricao: "Diagnóstico completo da operação de vendas e receita"
    especialistas:
      - especialista-leads
      - especialista-conversao
      - especialista-retencao
      - analista-receita

  lancamento_oferta:
    trigger: ["lançar oferta", "nova oferta", "promoção de lançamento"]
    descricao: "Planejamento completo para lançamento de oferta"
    especialistas:
      - especialista-ofertas
      - especialista-leads
      - especialista-conversao

  estrategia_crescimento:
    trigger: ["crescer mrr", "aumentar receita", "escalar vendas", "estratégia de crescimento"]
    descricao: "Estratégia integrada de crescimento de receita"
    especialistas:
      - analista-receita
      - especialista-ofertas
      - especialista-leads
      - especialista-retencao

  recuperacao_churn:
    trigger: ["reduzir churn", "churn alto", "estamos perdendo clientes"]
    descricao: "Plano de recuperação e redução de churn"
    especialistas:
      - especialista-retencao
      - analista-receita
      - especialista-ofertas

  estrutura_pipeline:
    trigger: ["estruturar pipeline", "processo de vendas", "funil b2b"]
    descricao: "Estruturação completa do pipeline de vendas"
    especialistas:
      - especialista-leads
      - especialista-conversao
      - analista-receita
