name: wf-recuperacao-churn
description: Workflow para diagnosticar e reduzir churn de forma sistemática
version: "1.0.0"

trigger:
  comando: "*jc-vendas:retencao"
  entradas_obrigatorias:
    - produto
    - churn_rate_atual

steps:

  - id: diagnostico_churn
    agente: analista-receita
    acao: "Analisar dados de churn (cohort, motivos, perfil dos cancelantes)"
    entradas: [produto, churn_rate_atual]
    saidas: [analise_cohort, motivos_churn, perfil_cancelante, momento_critico]
    tipo: sequencial

  - id: plano_retencao
    tipo: paralelo
    depende: [diagnostico_churn]
    steps:
      - id: onboarding_fix
        agente: especialista-retencao
        acao: "Revisar e corrigir gaps no onboarding"
        entradas: [motivos_churn, momento_critico]
        saidas: [onboarding_revisado, aha_moment_reforçado]

      - id: oferta_retencao
        agente: especialista-ofertas
        acao: "Criar ofertas de retenção (downgrade, pausa, bônus de permanência)"
        entradas: [analise_cohort, ticket_medio]
        saidas: [oferta_retencao, oferta_winback]

  - id: playbook_save
    agente: especialista-retencao
    acao: "Criar save playbook (processo de retenção ativa)"
    entradas: [motivos_churn, oferta_retencao]
    saidas: [save_playbook, alertas_churn, cadencia_retencao]
    tipo: sequencial
    depende: [plano_retencao]

  - id: projecao_impacto
    agente: analista-receita
    acao: "Projetar impacto no MRR com a redução de churn"
    entradas: [churn_rate_atual, plano_retencao]
    saidas: [projecao_mrr, meta_churn_revisada]
    tipo: sequencial
    depende: [playbook_save]

entregaveis:
  - Análise de cohort com causas raiz do churn
  - Onboarding revisado com aha moment garantido
  - Save playbook (sinais + abordagem + oferta)
  - Oferta de win-back para clientes que já saíram
  - Projeção de impacto no MRR
