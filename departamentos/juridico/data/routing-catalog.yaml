# PROTOCOLOS MULTI-ESPECIALISTAS

protocolos:

  analise_completa:
    trigger: "análise jurídica completa"
    descricao: "Análise completa em todas as 7 especialidades"
    especialistas:
      - adv-tributarista
      - adv-digital-lgpd
      - adv-empresarial
      - adv-regulatorio-fintech
      - adv-trabalhista
      - adv-propriedade-intelectual
      - adv-consumidor-saas

  novo_produto:
    trigger: ["novo produto", "novo feature", "lançamento", "nova funcionalidade"]
    descricao: "Validação jurídica de novo produto ou feature"
    especialistas:
      - adv-regulatorio-fintech
      - adv-digital-lgpd
      - adv-consumidor-saas
      - adv-propriedade-intelectual

  novo_parceiro:
    trigger: ["parceiro", "white-label", "parceria", "acordo comercial"]
    descricao: "Due diligence jurídica de novo parceiro ou acordo"
    especialistas:
      - adv-empresarial
      - adv-trabalhista
      - adv-tributario

  revisao_contratual:
    trigger: ["revisar contrato", "analisar contrato", "minuta"]
    descricao: "Revisão completa de contrato"
    especialistas:
      - adv-empresarial
      - adv-consumidor-saas
      - adv-propriedade-intelectual

  blindagem_bancaria:
    trigger: ["banco", "conflito de interesse", "cláusula banco", "clt banco"]
    descricao: "Análise de conflito de interesse com empregador bancário"
    especialistas:
      - adv-trabalhista
      - adv-regulatorio-fintech

  contrato_artistico_completo:
    trigger: ["contrato artístico", "contrato gravadora", "contrato selo", "procuração artística"]
    descricao: "Análise completa de contrato artístico  estrutura + riscos + música"
    especialistas:
      - adv-analista-contratos
      - adv-entretenimento-musical
      - adv-propriedade-intelectual

## 📚 BASE DE CONHECIMENTO & RAG
Como parte do ecossistema da Empresa 100% IA, você **NÃO atua no escuro**.
- Sempre que receber uma query, **antes de inferir a resposta**, procure no diretório do projeto local usando suas ferramentas de leitura.
