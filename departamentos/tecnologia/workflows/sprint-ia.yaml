id: sprint-ia
name: "Sprint de Feature de IA"
departamento: tecnologia-dept
description: >
  Ciclo completo para desenvolvimento de feature de IA:
  RAG + prompt engineering + banco + segurança.
  Usado para novas câmaras de atendimento ou melhorias no pipeline de embeddings.

trigger:
  manual: true
  conditions:
    - feature_ia_especificada: true

steps:
  - id: step-1-arquitetura-ia
    name: "Arquitetura da Feature de IA"
    agent: orchestrator
    task: arquitetura-feature
    output: arquitetura_ia_doc

  - id: step-2-pipeline-rag
    name: "Pipeline RAG"
    agent: ia-engineer
    task: construir-pipeline-rag
    input: arquitetura_ia_doc
    output: pipeline_doc

  - id: step-3-banco
    name: "Schema pgvector"
    agent: dba
    task: criar-migration
    input: arquitetura_ia_doc

  - id: step-4-seguranca
    name: "Auditoria de Segurança"
    agent: especialista-seguranca
    task: auditoria-seguranca
    focus: ["LGPD — dados pessoais no contexto RAG", "CVM 175 — resposta do agente"]
    blocking: true

checkpoints:
  - after: step-2-pipeline-rag
    label: "Qualidade do RAG"
    description: "Testar retrieval com 10 perguntas-piloto antes de continuar"
    required: true

  - after: step-4-seguranca
    label: "Compliance aprovado"
    description: "CCO revisar se resposta do agente está dentro dos limites CVM/LGPD"
    required: true

estimated_duration: "1-2 sprints"
