id: diagnostico-tecnico
name: "Diagnóstico Técnico Completo"
departamento: tecnologia-dept
description: >
  Diagnóstico completo do sistema quando há degradação de performance,
  problemas de segurança ou requisição de auditoria técnica.

trigger:
  manual: true
  automatic:
    - alerta_p1_ou_p2: true

steps:
  - id: step-1-diagnostico-paralelo
    name: "Diagnóstico Paralelo"
    parallel: true
    steps:
      - id: step-1a-infra
        agent: devops
        task: otimizar-performance
        focus: "VPS, containers, recursos"

      - id: step-1b-banco
        agent: dba
        task: otimizar-performance
        focus: "queries lentas, índices, conexões"

      - id: step-1c-seguranca
        agent: especialista-seguranca
        task: auditoria-seguranca
        focus: "auditoria proativa ou investigação de incidente"

  - id: step-2-sintese
    name: "Síntese e Plano de Ação"
    agent: orchestrator
    task: arquitetura-feature
    description: "Consolidar diagnósticos e montar plano de correção"
    input:
      - output_de_step-1a
      - output_de_step-1b
      - output_de_step-1c

output:
  - relatorio_diagnostico
  - plano_de_acao_priorizado
  - etag_de_incidente_se_aplicavel

estimated_duration: "2-4 horas para diagnóstico + timeline de correção"
