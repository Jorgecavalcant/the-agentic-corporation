---
name: departamento.yaml
description: Especialista da empresa.
dept: tecnologia
role: operacional
idioma: pt-BR
empresa: ${COMPANY_NAME:-Empresa IA}
---
name: empresa-ia-departamento
description: >
  Departamento de Engenharia e Tecnologia da .
  Responsável por toda a infraestrutura, desenvolvimento e sistemas de IA da empresa.
  Domínios: Next.js, FastAPI, PostgreSQL 16, Redis, Docker, Caddy, N8N, RAG, pgvector.
  Produtos: Método Planejar, AgroCredit, Fiado Pro.

tier: 0
orchestrator: orchestrator
idioma: pt-BR

agents:
  - id: orchestrator
    file: agents/orchestrator.md
    role: orchestrator
    tier: 0
    name: diretor-tecnologia
    description: CTO — arquitetura, decisões técnicas, orquestração do departamento de engenharia

  - id: dev-backend
    file: agents/dev-backend.md
    role: specialist
    tier: 1
    name: dev-backend
    description: Backend — FastAPI, Node.js, APIs REST, autenticação, BullMQ, integrações

  - id: dev-frontend
    file: agents/dev-frontend.md
    role: specialist
    tier: 1
    name: dev-frontend
    description: Frontend — Next.js 14, React, Tailwind CSS, dashboards, formulários

  - id: dba
    file: agents/dba.md
    role: specialist
    tier: 1
    name: dba
    description: DBA — PostgreSQL 16, pgvector, migrations, queries, performance, backup

  - id: devops
    file: agents/devops.md
    role: specialist
    tier: 1
    name: devops
    description: DevOps — Docker Compose, Caddy, SSL, deploy, CI/CD, VPS Hetzner

  - id: ia-engineer
    file: agents/ia-engineer.md
    role: specialist
    tier: 1
    name: ia-engineer
    description: Engenheiro de IA — RAG, pgvector, embeddings, Claude/GPT-4, prompts, agentes

  - id: especialista-seguranca
    file: agents/especialista-seguranca.md
    role: specialist
    tier: 1
    name: especialista-seguranca
    description: Segurança — OWASP, LGPD, CVM, pentest, auditoria de código, secrets management

tasks:
  - id: arquitetura-feature
    file: tasks/arquitetura-feature.md
    description: Projetar arquitetura de nova feature (componentes, fluxos, banco, API)

  - id: implementar-api
    file: tasks/implementar-api.md
    description: Implementar endpoint de API com validação, auth e testes

  - id: criar-migration
    file: tasks/criar-migration.md
    description: Criar migration PostgreSQL com rollback

  - id: deploy-producao
    file: tasks/deploy-producao.md
    description: Deploy de nova versão em produção com zero-downtime

  - id: construir-pipeline-rag
    file: tasks/construir-pipeline-rag.md
    description: Construir ou otimizar pipeline de RAG com pgvector e embeddings

  - id: auditoria-seguranca
    file: tasks/auditoria-seguranca.md
    description: Auditoria de segurança de endpoint, código ou infraestrutura

  - id: otimizar-performance
    file: tasks/otimizar-performance.md
    description: Diagnosticar e resolver gargalos de performance (query, cache, API)

  - id: revisao-codigo
    file: tasks/revisao-codigo.md
    description: Code review com foco em segurança, qualidade e arquitetura

workflows:
  - id: nova-feature-completa
    file: workflows/nova-feature-completa.yaml
    description: Pipeline completo — arquitetura → backend → frontend → banco → segurança → deploy
    steps:
      - agent: orchestrator
        task: arquitetura-feature
      - parallel:
          - agent: dev-backend
            task: implementar-api
          - agent: dev-frontend
            task: implementar-api
          - agent: dba
            task: criar-migration
      - agent: especialista-seguranca
        task: auditoria-seguranca
      - agent: devops
        task: deploy-producao

  - id: sprint-ia
    file: workflows/sprint-ia.yaml
    description: Ciclo completo de desenvolvimento de feature de IA — RAG + prompt + segurança
    steps:
      - agent: orchestrator
        task: arquitetura-feature
      - agent: ia-engineer
        task: construir-pipeline-rag
      - agent: dba
        task: criar-migration
      - agent: especialista-seguranca
        task: auditoria-seguranca

  - id: diagnostico-tecnico
    file: workflows/diagnostico-tecnico.yaml
    description: Diagnóstico completo de sistema — performance, segurança, arquitetura
    steps:
      - parallel:
          - agent: devops
            task: otimizar-performance
          - agent: dba
            task: otimizar-performance
          - agent: especialista-seguranca
            task: auditoria-seguranca
      - agent: orchestrator
        task: arquitetura-feature

checklists:
  - id: pre-deploy
    file: checklists/pre-deploy.md
  - id: revisao-seguranca
    file: checklists/revisao-seguranca.md
  - id: qualidade-codigo
    file: checklists/qualidade-codigo.md

routing:
  catalog: data/routing-catalog.yaml

## 📚 BASE DE CONHECIMENTO & RAG
Como parte do ecossistema da Empresa 100% IA, você **NÃO atua no escuro**.
- Sempre que receber uma query, **antes de inferir a resposta**, procure no diretório do projeto local usando suas ferramentas de leitura.
