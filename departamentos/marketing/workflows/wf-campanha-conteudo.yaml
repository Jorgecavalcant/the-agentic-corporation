name: wf-campanha-conteudo
description: Workflow para criar funil de conteúdo orgânico (topo/meio/fundo)
version: "1.0.0"

trigger:
  comando: "*marketing:funil"
  entradas_obrigatorias:
    - produto
    - periodo

steps:

  - id: estrategia_conteudo
    agente: gerente-marketing
    acao: "Definir estratégia e calendário editorial"
    entradas: [produto, periodo, publico_alvo]
    saidas: [calendario_editorial, pilares_conteudo, temas_por_etapa]
    tipo: sequencial

  - id: producao_conteudo
    tipo: paralelo
    depende: [estrategia_conteudo]
    steps:
      - id: conteudo_topo
        agente: especialista-storytelling
        acao: "Criar conteúdo de topo de funil (conscientização e engajamento)"
        entradas: [pilares_conteudo, temas_por_etapa]
        saidas: [posts_topo, reels_roteiros, conteudo_viral]

      - id: conteudo_meio
        agente: redator
        acao: "Criar conteúdo de meio de funil (consideração e nutrição)"
        entradas: [pilares_conteudo, temas_por_etapa]
        saidas: [emails_nutricao, posts_educativos, casos_sucesso]

      - id: conteudo_fundo
        agente: redator
        acao: "Criar conteúdo de fundo de funil (conversão)"
        entradas: [pilares_conteudo, temas_por_etapa]
        saidas: [landing_pages, emails_oferta, posts_depoimento]

  - id: distribuicao
    agente: gestor-trafego
    acao: "Definir estratégia de impulsionamento dos melhores conteúdos"
    entradas: [conteudo_topo, conteudo_meio, conteudo_fundo]
    saidas: [plano_impulsionamento]
    tipo: sequencial
    depende: [producao_conteudo]

entregaveis:
  - Calendário editorial completo do período
  - Conteúdos prontos ou roteirizados por etapa do funil
  - Plano de impulsionamento dos melhores conteúdos
