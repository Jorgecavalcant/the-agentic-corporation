departamento: pessoas-departamento
description: Roteamento de demandas de pessoas, cultura e documentação

domains:
  orchestrator:
    agent: orchestrator
    keywords:
      - novo agente
      - criar agente
      - atualizar agente
      - padrão v2
      - onboarding de agente
      - cultura da empresa
      - hierarquia
      - departamento
    examples:
      - "Criar novo agente para o departamento de marketing"
      - "Auditar os agentes que precisam atualização V2"

  documentador:
    agent: documentador
    keywords:
      - documentação
      - wiki
      - adr
      - changelog
      - guia de uso
      - readme
      - registrar decisão
      - changelog
    examples:
      - "Documentar a decisão de usar pgvector no RAG"
      - "Criar changelog da versão 1.2 do Método Planejar"

  qa-lead:
    agent: qa-lead
    keywords:
      - qa
      - qualidade
      - teste
      - testar
      - revisar código
      - code review
      - checklist pré-deploy
      - bug report
      - validar entrega
      - casos de teste
      - regressão
    examples:
      - "Revisar o PR do módulo de pagamentos antes do deploy"
      - "Criar casos de teste para a feature de exportação de dados"
      - "Validar o checklist pré-deploy da versão 2.1"
