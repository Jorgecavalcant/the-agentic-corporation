name: wf-funil-vendas
description: Workflow completo para estruturar ou revisar o funil de vendas de um produto JC
version: "1.0.0"

trigger:
  comando: "*vendas:pipeline"
  entradas_obrigatorias:
    - produto
    - modelo  # b2c, b2b ou ambos

steps:

  - id: metricas_atuais
    agente: analista-receita
    acao: "Levantar métricas atuais de conversão e receita"
    entradas: [produto, modelo]
    saidas: [mrr_atual, churn_atual, cac_atual, ltv_atual, taxa_conversao]
    tipo: sequencial

  - id: analise_funil
    tipo: paralelo
    depende: [metricas_atuais]
    steps:
      - id: topo_funil
        agente: especialista-leads
        acao: "Analisar e otimizar topo do funil (aquisição e qualificação)"
        entradas: [produto, modelo, metricas_atuais]
        saidas: [icp_definido, canais_aquisicao, lead_scoring, cadencia]

      - id: meio_fundo_funil
        agente: especialista-conversao
        acao: "Analisar e otimizar meio e fundo do funil (conversão e fechamento)"
        entradas: [produto, modelo, metricas_atuais]
        saidas: [processo_vendas, scripts_objecoes, processo_demo, fechamento]

      - id: pos_venda
        agente: especialista-retencao
        acao: "Estruturar pós-venda (onboarding, sucesso e retenção)"
        entradas: [produto, modelo, churn_atual]
        saidas: [playbook_onboarding, sinais_churn, save_playbook]

  - id: oferta_pricing
    agente: especialista-ofertas
    acao: "Revisar oferta e pricing em relação às métricas"
    entradas: [produto, ltv_atual, cac_atual]
    saidas: [oferta_revisada, pricing_recomendado]
    tipo: sequencial
    depende: [analise_funil]

  - id: sintese_diretor
    agente: orchestrator
    acao: "Consolidar em plano de ação de vendas"
    entradas: [todos os outputs anteriores]
    saidas: [plano_funil_completo]
    tipo: sequencial
    depende: [oferta_pricing]
    checklist: checklist-qualidade-vendas.md

entregaveis:
  - Diagnóstico do funil atual (métricas + gaps)
  - ICP definido e lead scoring
  - Processo de vendas etapa a etapa
  - Playbook de onboarding
  - Oferta e pricing revisados
  - Plano de ação priorizado

