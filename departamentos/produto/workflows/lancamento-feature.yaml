id: lancamento-feature
name: "Da Ideia ao Lançamento"
departamento: produto-dept
description: >
  Pipeline de produto completo: discovery → especificação → priorização → handoff para tecnologia.
  Garante que features entram no desenvolvimento com contexto completo.

steps:
  - id: step-1-pesquisa
    name: "Pesquisa e Contexto"
    agent: pesquisador
    task: pesquisa-mercado
    output: contexto_mercado

  - id: step-2-discovery
    name: "Discovery da Feature"
    agent: orchestrator
    task: discovery-feature
    input: contexto_mercado
    output: discovery_doc
    checkpoint:
      label: "Go/No-go do Discovery"
      required: true

  - id: step-3-priorizacao
    name: "Priorização e Roadmap"
    agent: gestor_produto_responsavel
    task: priorizar-backlog
    input: discovery_doc

  - id: step-4-handoff
    name: "Handoff para Tecnologia"
    description: "Entregar spec completa ao diretor-tecnologia para arquitetura"
    agent: orchestrator
    cross_departamento:
      target_departamento: tecnologia-dept
      target_workflow: nova-feature-completa

checkpoints:
  - after: step-2-discovery
    label: "CEO aprova feature?"
    required: true

estimated_duration: "1-2 semanas (discovery) + desenvolvimento"
